<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="relationships" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#121212" />
  <title>relationships</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&family=Atkinson+Hyperlegible+Next:ital,wght@0,200..800;1,200..800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app-shell" class="app-shell">
    <main id="scroll-content" class="app">
      <div id="vignette" class="vignette"></div>

      <section class="board" aria-label="Word grid" id="board"></section>

      <div class="debug-ui">
        <div id="paletteChips" class="paletteChips"></div>
        <section class="controls">
          <div class="row">
            <button id="newGameBtn" class="btn" type="button">New game</button>
          </div>

          <div class="row">
            <div id="status" class="status" aria-live="polite"></div>
          </div>

          <div class="row hints">
            <span class="label">Hints:</span>
            <button id="hintCategoryBtn" class="btn btn-secondary" type="button">Reveal a category</button>
            <button id="hintWordBtn" class="btn btn-secondary" type="button">Reveal a word</button>
            <button id="glossaryBtn" class="btn btn-secondary" type="button">Glossary</button>
          </div>

          <div id="most-recent-guess"></div>
        </section>
      </div>

      <section class="found debug-ui">
        <h2>Found Relationships</h2>
        <div id="foundGroups" class="foundGroups"></div>
      </section>

      <section class="guesses debug-ui" id="guesses"></section>

      <section class="footer-controls debug-ui">
        <div class="row">
          <label class="label" for="puzzleSelect">Puzzle:</label>
          <select id="puzzleSelect" class="select"></select>
        </div>
        <div id="uploader-container"></div>
      </section>
    </main>

    <footer id="fixed-footer" class="bottom-sheet" aria-label="Game controls">
      <div class="cta-stack">
        <button id="submitBtn" class="btn btn-primary btn-block" type="button">Submit</button>
        <div class="cta-row">
          <button id="shuffleBtn" class="btn btn-block-half" type="button">Shuffle</button>
          <button id="clearBtn" class="btn btn-secondary btn-block-half" type="button">Clear</button>
        </div>
      </div>
    </footer>
  </div>

  <script type="module" src="./src/main.js"></script>

  <div id="glossary-tooltip" class="tooltip" style="display: none;"></div>
</body>
</html>
